<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITTLEFUN | Blackjack</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="contract-config.js"></script>
    <link rel="stylesheet" href="blackjack.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">LITTLEFUN</a>
        <div class="user-info">
            <div id="balanceBadge" class="badge" style="display:none">0.00 ETH</div>
            <button id="mainBtn" class="connect-btn" onclick="connectWallet()">Connect Wallet</button>
        </div>
    </header>
    <main>
        <div class="sidebar-panel">
            <div class="glass-card">
                <label class="label">Bet Amount (ETH)</label>
                <input type="number" id="betAmount" value="0.1" step="0.01" min="0.01">
                <button id="dealBtn" class="deal-btn" onclick="startGame()" disabled>LOGIN REQUIRED</button>
            </div>
            <div class="glass-card">
                <label class="label">Session Stats</label>
                <div class="stat-grid">
                    <div class="stat-item"><div class="label">PLAYED</div><div id="stPlayed">0</div></div>
                    <div class="stat-item"><div class="label">WON</div><div id="stWon" class="green">0</div></div>
                    <div class="stat-item"><div class="label">TOTAL BET</div><div id="stBet">0.000</div></div>
                    <div class="stat-item"><div class="label">TOTAL WIN</div><div id="stWin" class="green">0.000</div></div>
                </div>
            </div>
        </div>
        <div class="game-area">
            <div class="table">
                <div class="shoe"></div>
                <div class="dealer-section">
                    <div class="hand-label">DEALER <span id="dealerScore" class="score-badge"></span></div>
                    <div id="dealerHand" class="hand"></div>
                </div>
                <div id="gameMessage" class="game-message"></div>
                <div class="player-section">
                    <div class="hand-label">YOU <span id="playerScore" class="score-badge"></span></div>
                    <div id="playerHand" class="hand"></div>
                </div>
                <div id="actionBtns" class="action-buttons" style="display:none">
                    <button class="action-btn hit" onclick="playerHit()">HIT</button>
                    <button class="action-btn stand" onclick="playerStand()">STAND</button>
                    <button class="action-btn double" id="doubleBtn" onclick="playerDouble()">DOUBLE</button>
                </div>
                <!-- Insurance Modal -->
                <div id="insuranceModal" class="insurance-modal" style="display:none">
                    <h3>Dealer has an Ace!</h3>
                    <p>Insurance pays 2:1. Costs 0.5x bet.</p>
                    <div class="ins-btns">
                        <button class="action-btn double" onclick="takeInsurance(true)">Take Insurance</button>
                        <button class="action-btn stand" onclick="takeInsurance(false)">No Thanks</button>
                    </div>
                </div>
            </div>
            <div class="glass-card">
                <label class="label">GAME HISTORY</label>
                <table class="history-tbl"><thead><tr><th>Time</th><th>Bet</th><th>Result</th><th>Payout</th></tr></thead><tbody id="historyBody"></tbody></table>
            </div>
        </div>
    </main>
    <script src="blackjack.js"></script>
</body>
</html>
